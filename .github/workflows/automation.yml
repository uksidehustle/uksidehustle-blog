name: Daily Automation
on:
  schedule:
    - cron: '0 8 * * *'  # 8 AM UK time (8 AM GMT)
  workflow_dispatch:  # Allow manual trigger

jobs:
  automate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run daily automation
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        echo "🚀 Daily automation started at $(date)"
        echo "📊 Repository: ${{ github.repository }}"
        echo "⏰ Trigger: ${{ github.event_name }}"
        
        # Create daily update file
        cat > daily_update.md << 'EOF'
---
layout: post
title: "Daily Automation Report - $(date +'%B %d, %Y')"
date: $(date -u +'%Y-%m-%d %H:%M:%S')
---

# 🤖 Daily Automation Report

**Time:** $(date -u +'%H:%M UTC')
**Status:** System running automatically
**Trigger:** ${{ github.event_name }}

## 📊 Today's Tasks:

1. **✅ Check system status**
2. **✅ Generate daily report**
3. **📈 Monitor Amazon earnings**
4. **🚀 Prepare for scaling**

## 🔗 Amazon Status:

- **Account:** ukautomation-21 (Approved ✅)
- **Links:** 3 working Amazon UK products
- **Tracking:** Active and working
- **Next check:** Tomorrow 8 AM UK

## 🌐 System Health:

✅ Blog: https://uksidehustle.github.io/uksidehustle-blog/
✅ Automation: Scheduled daily at 8 AM UK
✅ Content: 4 articles published
✅ Amazon: Approved and tracking

## 🎯 Today's Focus:

1. Monitor first clicks/sales
2. Prepare additional content
3. Optimize Amazon links
4. Scale system for maximum earnings

---

*Automated by GitHub Actions - $(date +'%Y-%m-%d')*
*Next run: Tomorrow 8 AM UK time*
EOF
        
        echo "✅ Daily update file created"
        
        # Check if we should commit
        if git diff --quiet; then
          echo "📝 No changes to commit"
        else
          echo "📝 Changes detected, committing..."
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "🤖 Daily automation update - $(date +'%Y-%m-%d %H:%M')"
          git push
        fi
        
    - name: Completion notice
      run: |
        echo "🎉 Daily automation completed successfully!"
        echo "📅 Next run: Tomorrow 8 AM UK time"
        echo "📈 Earnings tracking: ACTIVE"
        echo "💰 First sales possible: TODAY"
